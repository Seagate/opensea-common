name: CI for meson test

on: 
  push:
    branches:
      - pratiksha
  pull_request:
    branches:
      - pratiksha

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install Meson and Ninja
      run: |
        python -m pip install --upgrade pip
        pip install meson ninja
    
    - name: Install expect
      run: sudo apt-get update && sudo apt-get install -y expect

    - name: Configure Meson
      run: |
        meson setup Meson/Executables --buildtype=release

    - name: Build with Meson
      run: |
        meson compile -C Meson/Executables
    
    - name: Run test
      run: |
        meson test -C Meson/Executables --verbose
    