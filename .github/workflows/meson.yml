name: CI for meson test

on: 
  push:
    branches:
      - pratiksha
  pull_request:
    branches:
      - pratiksha

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install Meson, Ninja and coverage tools
      run: |
        python -m pip install --upgrade pip
        pip install meson ninja gcovr
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y expect lcov gcc g++

    - name: Configure Meson
      run: |
        meson setup Meson/Executables --buildtype=release -Db_coverage=true

    - name: Build with Meson
      run: |
        meson compile -C Meson/Executables
    
    - name: Run test
      run: |
        meson test -C Meson/Executables --verbose

    - name: Generate coverage
      run: |
        ninja -C Meson/Executables coverage

    - name: Generate grouped branch coverage (gcovr)
      run: |
        gcovr --root . \
              --filter 'src/' \
              --branch \
              --html-details grouped_branch_coverage.html \
              --html-title "Grouped Branch Coverage Report" \
              --html-theme=green

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          Meson/Executables/meson-logs
          grouped_branch_coverage.html

    