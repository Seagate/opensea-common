name: CI for meson test

on: 
  push:
    branches:
      - pratiksha
  pull_request:
    branches:
      - pratiksha

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install Meson and Ninja
      run: |
        python -m pip install --upgrade pip
        pip install meson ninja
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y expect lcov gcc

    - name: Configure Meson
      run: |
        meson setup Meson/Executables --buildtype=release -Db_coverage=true

    - name: Build with Meson
      run: |
        meson compile -C Meson/Executables
    
    - name: Run test
      run: |
        meson test -C Meson/Executables --verbose

    - name: Generate coverage
      run: |
        lcov --capture --directory Meson/Executables --output-file coverage.info
        lcov --remove coverage.info '/usr/*' --output-file coverage.info
        genhtml coverage.info --output-directory coverage-html

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-html/

    