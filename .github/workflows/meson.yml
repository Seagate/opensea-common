name: CI for meson test

on: 
  push:
    branches:
      - pratiksha
  pull_request:
    branches:
      - pratiksha

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install Meson and Ninja
      run: |
        python -m pip install --upgrade pip
        pip install meson ninja
    
    # Linux dependencies
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y expect lcov gcc

    # Windows dependencies
    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install mingw -y

    - name: Configure Meson
      shell: bash
      run: |
        CFLAGS="-fsanitize=address -fno-omit-frame-pointer" \
        LDFLAGS="-fsanitize=address" \
        meson setup Meson/Executables --buildtype=debug -Db_coverage=true

    - name: Build with Meson
      run: |
        meson compile -C Meson/Executables
    
    - name: Run test
      shell: bash
      run: |
        ASAN_OPTIONS=allocator_may_return_null=1:detect_leaks=1 \
        meson test -C Meson/Executables --verbose

    - name: Generate coverage (Linux only)
      if: runner.os == 'Linux'
      run: |
        ninja -C Meson/Executables coverage

    - name: Upload coverage report
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: Meson/Executables/meson-logs

    